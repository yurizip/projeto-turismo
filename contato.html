<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
        <title>Brasil Encantado</title>
    </head>
    <body class="teste">
        <header class="nav">
            <div class="logo"><img src="img/logo.png" alt="logo"></div>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="gastronomia.html">Gastronomia</a>
                <a href="destino.html">Destino</a>
                <a id="pagAtual" href="contato.html">Contato</a>
            </nav>
        </header>
        <main>
            <section class="hero">
                <div>
                    <h1>Entre em Contato!</h1>
                    
                </div>
            </section>
            <div class="container">
                <form>
                    <h2>Nos envie uma mensagem!</h2>
                    <div class="linha">
                        <div class="campo">
                            <label>Nome</label><input type="text" value="" placeholder="Nome... Ex: Joãozinho">
                        </div>
                        <div class="campo">
                            <label>Email</label>
                            <input type="email" value="" placeholder="Email... Ex: joaozingameplays@gmail.com">
                        </div>
                    </div>
                    <div class="linha">    
                        <div class="campo">
                            <label>Assunto</label>
                            <input type="text" value="" placeholder="Assunto...">
                        </div>
                    </div>
                    <div class="linha">    
                        <div class="campo">
                            <label>Mensagem</label>
                            <textarea rows="5" maxlength="500" placeholder="Mensagem..."></textarea>
                        </div>
                    </div>    
                    <div class="acoes">
                            <button type="reset" class="reset">Limpar</button>
                            <button type="submit" class="submit">Enviar</button>
                        </div>
                </form>
            </div>
        </main>
        <footer class="footer">
            <p>Brasil Encantado</p>
            <p>Alexandre Rios</p>
            <p>Lucas romano</p>
            <p>Yuri Cunha</p>
            <p>@2026</p>
            <p>email@email.com</p>
        </footer>
    </body>
</html>
